<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POP AI - New Engine</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e11; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-card { width: 100%; max-width: 480px; height: 85vh; background: #15191c; border-radius: 25px; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.7); border: 2px solid #ff007a; overflow: hidden; }
        .chat-header { padding: 20px; text-align: center; background: linear-gradient(90deg, #ff007a, #7a00ff); color: white; font-weight: bold; font-size: 1.5rem; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 0.95rem; word-wrap: break-word; }
        .user-msg { align-self: flex-end; background: #ff007a; color: white; border-bottom-right-radius: 2px; }
        .bot-msg { align-self: flex-start; background: #2a2e33; color: #f0f0f0; border-bottom-left-radius: 2px; border: 1px solid #444; }
        .input-box { display: flex; padding: 20px; background: #1c2126; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #2a2e33; border: 1px solid #444; padding: 12px; color: white; border-radius: 12px; outline: none; }
        button { background: #7a00ff; border: none; padding: 0 20px; border-radius: 12px; cursor: pointer; color: white; font-weight: bold; }
        .tg-link { color: #00d2ff; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>

<div class="chat-card">
    <div class="chat-header">POP AI</div>
    <div id="chat-window">
        <div class="msg bot-msg">System Ready! Nayi API Key active hai. Puchiye kya puchna hai?</div>
    </div>
    <div class="input-box">
        <input type="text" id="user-input" placeholder="Kuch likhein..." autocomplete="off">
        <button onclick="askAI()">Bhejein</button>
    </div>
</div>

<script>
    // Aapki Nayi API Key
    const API_KEY = "AIzaSyAEh7JLRGuhbqtS2iSUDqSNDHBYNzLUmUk"; 
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    async function askAI() {
        const inputField = document.getElementById('user-input');
        const chatWindow = document.getElementById('chat-window');
        const userText = inputField.value.trim();

        if (userText === "") return;

        // User Message Display
        chatWindow.innerHTML += `<div class="msg user-msg">${userText}</div>`;
        inputField.value = "";
        
        const botDiv = document.createElement("div");
        botDiv.className = "msg bot-msg";
        botDiv.innerText = "POP AI soch raha hai...";
        chatWindow.appendChild(botDiv);
        chatWindow.scrollTop = chatWindow.scrollHeight;

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: userText }] }],
                    // Safety settings ko thoda loose rakha hai taaki zyada answers mil sakein
                    safetySettings: [
                        { category: "HARM_CATEGORY_HARASSMENT", threshold: "BLOCK_NONE" },
                        { category: "HARM_CATEGORY_HATE_SPEECH", threshold: "BLOCK_NONE" }
                    ]
                })
            });

            const data = await response.json();

            if (data.error) {
                botDiv.innerHTML = `⚠️ Error: ${data.error.message}<br>Contact: <a href="https://t.me/Rajeshff0" class="tg-link">Rajesh Support</a>`;
            } else if (data.candidates && data.candidates[0].content) {
                let aiResponse = data.candidates[0].content.parts[0].text;
                botDiv.innerText = aiResponse;
            } else {
                botDiv.innerHTML = "❌ AI ne jawab block kar diya (Safety Reason). Kuch aur puchiye.";
            }
        } catch (error) {
            botDiv.innerHTML = "📡 Network Issue! Check karein ki internet chal raha hai.";
            console.error(error);
        }
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') askAI(); });
</script>

</body>
</html>
