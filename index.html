<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POP AI - Mera Assistant</title>
    <style>
        /* Modern & Pop Design */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0e11; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-card { width: 100%; max-width: 480px; height: 85vh; background: #15191c; border-radius: 25px; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.7); border: 2px solid #ff007a; overflow: hidden; }
        .chat-header { padding: 20px; text-align: center; background: linear-gradient(90deg, #ff007a, #7a00ff); color: white; font-weight: bold; font-size: 1.5rem; letter-spacing: 1px; text-transform: uppercase; }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #15191c; scroll-behavior: smooth; }
        
        /* Message Bubbles */
        .msg { padding: 12px 18px; border-radius: 20px; max-width: 80%; font-size: 0.95rem; line-height: 1.5; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .user-msg { align-self: flex-end; background: #ff007a; color: white; border-bottom-right-radius: 2px; }
        .bot-msg { align-self: flex-start; background: #2a2e33; color: #f0f0f0; border: 1px solid #444; border-bottom-left-radius: 2px; }
        
        /* Input Area */
        .input-box { display: flex; padding: 20px; background: #1c2126; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #2a2e33; border: 1px solid #444; padding: 12px 15px; color: white; border-radius: 12px; outline: none; font-size: 1rem; }
        input:focus { border-color: #ff007a; }
        button { background: #7a00ff; border: none; padding: 0 20px; border-radius: 12px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        button:hover { background: #ff007a; transform: translateY(-2px); }
        
        /* Custom Scrollbar */
        #chat-window::-webkit-scrollbar { width: 5px; }
        #chat-window::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    </style>
</head>
<body>

<div class="chat-card">
    <div class="chat-header">POP AI</div>
    <div id="chat-window">
        <div class="msg bot-msg">Namaste! Main **POP AI** hoon. Main aapki kya madad kar sakta hoon?</div>
    </div>
    <div class="input-box">
        <input type="text" id="user-input" placeholder="Kuch mazedaar puchiye..." autocomplete="off">
        <button onclick="askAI()">Bhejein</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyCidUSOVufEHarXoiVUwGTdqQb8KF_nuIQ"; 
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

    async function askAI() {
        const inputField = document.getElementById('user-input');
        const chatWindow = document.getElementById('chat-window');
        const userText = inputField.value.trim();

        if (userText === "") return;

        // User Message
        chatWindow.innerHTML += `<div class="msg user-msg">${userText}</div>`;
        inputField.value = "";
        chatWindow.scrollTop = chatWindow.scrollHeight;

        // Loading bubble
        const botDiv = document.createElement("div");
        botDiv.className = "msg bot-msg";
        botDiv.innerText = "POP AI soch raha hai...";
        chatWindow.appendChild(botDiv);

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: userText }] }]
                })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const aiReply = data.candidates[0].content.parts[0].text;
                // AI Reply replace loading text
                botDiv.innerHTML = aiReply.replace(/\n/g, "<br>"); 
            } else {
                botDiv.innerText = "Ups! Main samajh nahi paaya. Phir se likhiye?";
            }
        } catch (error) {
            botDiv.innerText = "Error: Connection problem! Check kijiye ki aapka internet chal raha hai ya nahi.";
        }
        
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    // Enter key support
    document.getElementById('user-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') askAI();
    });
</script>

</body>
</html>
